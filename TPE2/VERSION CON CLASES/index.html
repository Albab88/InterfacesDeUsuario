<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BARRAGAN - TPE2</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

    <header>
        <h1>Web Drawing Tool</h1>
        <img src="/images/Web Drawing Tool logo bordo.png" alt="icono de pintura" class="icon">
        <p>Editor de dibujo y filtros en tiempo real</p>
    </header>

    <aside class="toolbar">
        <button class="tool" id="pencilBtn"> ✏️ Lápiz</button>
        <button class="tool" id="eraserBtn"> 🧽 Goma</button>
        <button class="tool" id="undoBtn"> 🔙 Deshacer</button>
        <button class="tool" id="clearBtn"> 🗑️ Borrar todo</button>

        <label>Color</label>
        <input type="color" id="colorPicker">

        <label>Tamaño</label>
        <input type="range" class="sizeInput" id="sizeInput" min="1" max="20" value="5">

        <button class="tool" id="saveBtn"> 💾 Guardar</button>

        <label class="tool upload"> 📂 Cargar imagen
            <input type="file" id="uploadInput" accept="image/*" hidden>
        </label>

        <label>Filtros</label>
        <div class="filtros">
            <button class="tool" id="toggleFiltros"> Filtros 👇</button>

            <div id="filtrosMenu" class="collapse">
                <br>
                <label>Brillo</label>
                <input type="range" min="-100" max="100" value="0" class="sizeInput" id="brillo">
                <label>Constraste</label>
                <input type="range" min="-100" max="100" value="0" class="sizeInput" id="contraste">
                <br>
                <button class="tool filtroBtn" id="btn-FiltroBN">Escala de grises</button>
                <button class="tool filtroBtn" id="btn-FiltroBinarizacion">Binarización</button>
                <button class="tool filtroBtn" id="btn-FiltroSepia">Sepia</button>
                <button class="tool filtroBtn" id="btn-FiltroRojo">Rojo</button>
                <button class="tool filtroBtn" id="btn-FiltroVerde">Verde</button>
                <button class="tool filtroBtn" id="btn-FiltroAzul">Azul</button>
                <button class="tool filtroBtn" id="btn-FiltroNegativo">Negativo</button>
                <button class="tool filtroBtn" id="btn-FiltroBlur">Blur</button>
            </div>
        </div>
    </aside>

    <main>
        <canvas id="canvas"></canvas>
    </main>

</div>

<script src="Filter.js"></script>
<script src="Paint.js"></script>
<script src="App.js"></script>
</body>
</html>
